name: Build release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_suffix: ${{ steps.version.outputs.artifact_suffix }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute branch version
        id: version
        shell: bash
        run: |
          version_file="Source/Shared/ClashOfRim.Compatibility/Versioning/ClashOfRimVersion.cs"
          product_version="$(sed -nE 's/.*ProductVersion[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "${version_file}" | head -n 1)"
          if [ -z "${product_version}" ]; then
            echo "Unable to read ProductVersion from ${version_file}" >&2
            exit 1
          fi

          branch="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::8}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            version="${product_version}"
          else
            version="${product_version}-${branch}.${short_sha}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "artifact_suffix=${version}" >> "${GITHUB_OUTPUT}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          fi

  build-server:
    name: Build server (${{ matrix.rid }})
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        shell: pwsh
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $token = $env:SUBMODULES_TOKEN
          if ([string]::IsNullOrWhiteSpace($token)) {
            $token = $env:GITHUB_TOKEN
          }

          $encoded = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$token"))
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $encoded" submodule update --init --recursive
          if ($LASTEXITCODE -ne 0) {
            throw "Submodule checkout failed. If ThirdPartyCompat is private, add a SUBMODULES_TOKEN repository secret with read access to AIRsLight/ClashOfRim.ThirdPartyCompat."
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build server package
        shell: pwsh
        run: ./Tools/BuildServerPackage.ps1 -Configuration Release -RuntimeIdentifier ${{ matrix.rid }}

      - name: Archive server package
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $PWD "Artifacts"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          $source = Join-Path $PWD "Build/ClashOfRim.NetworkServer/${{ matrix.rid }}"
          $archive = Join-Path $artifactRoot "ClashOfRim.NetworkServer-${{ matrix.rid }}-${{ needs.metadata.outputs.artifact_suffix }}.zip"
          Compress-Archive -Path (Join-Path $source "*") -DestinationPath $archive -Force

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.rid }}
          path: Artifacts/*.zip
          if-no-files-found: error

  build-client-mods:
    name: Build client mods
    needs: metadata
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        shell: pwsh
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $token = $env:SUBMODULES_TOKEN
          if ([string]::IsNullOrWhiteSpace($token)) {
            $token = $env:GITHUB_TOKEN
          }

          $encoded = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$token"))
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $encoded" submodule update --init --recursive
          if ($LASTEXITCODE -ne 0) {
            throw "Submodule checkout failed. If ThirdPartyCompat is private, add a SUBMODULES_TOKEN repository secret with read access to AIRsLight/ClashOfRim.ThirdPartyCompat."
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore RimWorld client reference packages
        shell: pwsh
        run: |
          $restoreRoot = Join-Path $PWD "Build/ClientReferenceRestore"
          if (Test-Path -LiteralPath $restoreRoot) {
            Remove-Item -LiteralPath $restoreRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $restoreRoot | Out-Null
          @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net472</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="krafs.rimworld.ref" Version="1.6.4566" PrivateAssets="all" />
              <PackageReference Include="lib.harmony" Version="2.4.1" PrivateAssets="all" />
            </ItemGroup>
          </Project>
          "@ | Set-Content -LiteralPath (Join-Path $restoreRoot "ClientReferenceRestore.csproj") -Encoding UTF8

          dotnet restore (Join-Path $restoreRoot "ClientReferenceRestore.csproj")
          if ($LASTEXITCODE -ne 0) {
            throw "RimWorld client reference package restore failed with exit code $LASTEXITCODE"
          }

      - name: Restore main client mod
        shell: pwsh
        run: dotnet restore Source/Client/ClashOfRim.csproj

      - name: Build main client mod
        shell: pwsh
        run: ./Tools/BuildClientMod.ps1 -Configuration Release

      - name: Build third-party compatibility client mod
        shell: pwsh
        run: ./Tools/BuildThirdPartyCompatMod.ps1 -Configuration Release -Clean

      - name: Archive client mods
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $PWD "Artifacts"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          Compress-Archive -LiteralPath (Join-Path $PWD "Build/ClashOfRim") -DestinationPath (Join-Path $artifactRoot "ClashOfRim.ClientMod-${{ needs.metadata.outputs.artifact_suffix }}.zip") -Force
          Compress-Archive -LiteralPath (Join-Path $PWD "Build/ClashOfRim.ThirdPartyCompat") -DestinationPath (Join-Path $artifactRoot "ClashOfRim.ThirdPartyCompat.ClientMod-${{ needs.metadata.outputs.artifact_suffix }}.zip") -Force

      - name: Upload client mod artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-mods
          path: Artifacts/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - metadata
      - build-server
      - build-client-mods
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.metadata.outputs.version }}
          IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
        shell: bash
        run: |
          args=()
          if [ "${IS_PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi

          if [ "${IS_PRERELEASE}" = "true" ]; then
            branch="${GITHUB_REF_NAME//\//-}"
            branch_pattern="$(printf '%s' "${branch}" | sed 's/[][(){}.^$*+?|\\]/\\&/g')"
            gh release list --limit 1000 --json tagName,isPrerelease \
              --jq ".[] | select(.isPrerelease and (.tagName | test(\"^[0-9]+\\\\.[0-9]+\\\\.[0-9]+-${branch_pattern}(\\\\.|$)\"))) | .tagName" \
              | while read -r old_release; do
                  if [ -n "${old_release}" ] && [ "${old_release}" != "${VERSION}" ]; then
                    gh release delete "${old_release}" --cleanup-tag -y || true
                  fi
                done
          fi

          gh release delete "${VERSION}" --cleanup-tag -y || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${VERSION}" || true
          if [ "${IS_PRERELEASE}" = "true" ]; then
            release_notes="$(printf '%s\n\n%s\n\n%s' \
              "Development build warning:" \
              "This build is published from the ${GITHUB_REF_NAME} branch for testing. It may contain unfinished or unstable changes. Most players should use the latest stable release from the main branch unless they are helping test or report issues." \
              "Automated build for ${GITHUB_REF_NAME} (${GITHUB_SHA}).")"
          else
            release_notes="Automated build for ${GITHUB_REF_NAME} (${GITHUB_SHA})."
          fi

          gh release create "${VERSION}" dist/*.zip \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes "${release_notes}" \
            "${args[@]}"
